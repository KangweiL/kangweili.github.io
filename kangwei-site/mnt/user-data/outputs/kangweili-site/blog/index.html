<!DOCTYPE html>
<html lang="en">
<head>

  <title>Blog — Kangwei Li</title>

          <a href="#" class="nav-link" data-filter="research">Research</a>

    <main class="main">
      <div id="list-view">
        <header class="main-header">
          <div class="header-row">
            <h2 class="section-title">All Posts</h2>
            <input type="text" id="search" placeholder="Search..." class="search-box"/>
          </div>
        </header>
        <div id="post-list" class="post-list">
          <div class="loading">Loading posts…</div>
        </div>
      </div>

      <div id="post-view" class="hidden">
        <button id="back-btn" class="back-btn">← Back</button>
        <article id="post-content" class="post-content"></article>
      </div>
    </main>
  </div>

  <script src="js/posts.js"></script>
  <script src="js/app.js"></script>

</html>
